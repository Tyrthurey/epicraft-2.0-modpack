name: Publish Modpack

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Pakku
        run: |
          curl -L -o pakku https://github.com/juraj-hrivnak/Pakku/releases/latest/download/pakku
          chmod +x pakku

      - name: Configure Pakku credentials
        run: ./pakku credentials add curseforge ${{ secrets.CURSEFORGE_API_KEY }}

      - name: Export for CurseForge
        run: ./pakku export curseforge

      - name: Export for Modrinth
        run: ./pakku export modrinth

      - name: Publish to all platforms
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          # # Modrinth - only gets .mrpack
          # modrinth-id: ${{ secrets.MODRINTH_PROJECT_ID }}
          # modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          # modrinth-files: build/modrinth/*.mrpack

          # # CurseForge - only gets .zip
          # curseforge-id: ${{ secrets.CURSEFORGE_PROJECT_ID }}
          # curseforge-token: ${{ secrets.CURSEFORGE_API_KEY }}
          # curseforge-files: build/curseforge/*.zip

          # GitHub release
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-files: |
            build/modrinth/*.mrpack
            build/curseforge/*.zip

          changelog: ${{ github.event.release.body }}

          loaders: |
            neoforge

          game-versions: |
            1.21.1

          java: |
            21

          retry-attempts: 3
          retry-delay: 10000
          fail-mode: fail
